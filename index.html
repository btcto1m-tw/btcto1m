<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BTCto1M</title>
  <meta name="description" content="BTCto1M" />
  <style>
    :root {
      --gold: #C9A24B;
      --gold-deep: #B8860B;
      --black: #1a1a1a;
      --white: #ffffff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
        "PingFang TC", "Microsoft JhengHei", sans-serif;
      background: var(--white);
      color: var(--black);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 64px 20px 40px;
    }

    .logo {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--gold);
      box-shadow: 0 4px 20px rgba(201, 162, 75, 0.25);
    }

    h1 {
      margin-top: 24px;
      font-size: 1.7rem;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    h1 span { color: var(--gold-deep); }

    .tagline {
      margin-top: 8px;
      font-size: 0.95rem;
      color: #666;
    }

    .divider {
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      border-radius: 3px;
      margin: 28px 0 32px;
    }

    .links {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .link-btn {
      display: block;
      text-align: center;
      text-decoration: none;
      color: var(--black);
      background: var(--white);
      border: 2px solid var(--gold);
      border-radius: 14px;
      padding: 18px 20px;
      font-size: 1.05rem;
      font-weight: 600;
      transition: transform 0.15s ease, background 0.2s ease, color 0.2s ease,
        box-shadow 0.2s ease;
    }

    .link-btn:hover {
      background: var(--gold);
      color: var(--white);
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(201, 162, 75, 0.35);
    }

    footer {
      margin-top: auto;
      padding-top: 40px;
      font-size: 0.8rem;
      color: #aaa;
    }
  </style>
</head>
<body>
  <img class="logo" src="logo.png" alt="BTCto1M Logo" />

  <h1>BTC<span>to1M</span></h1>
  <p class="tagline">Bitcoin to one million</p>

  <div class="divider"></div>

  <nav class="links">
    <a class="link-btn" href="https://buy.stripe.com/8x24gyelCeNa0Ow0mv5EY08"
       target="_blank" rel="noopener">
      購買電子書
    </a>
  </nav>

  <footer>© <span id="year"></span> btcto1m.com</footer>
  <script>document.getElementById("year").textContent = new Date().getFullYear();</script>
</body>
</html>
